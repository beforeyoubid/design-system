name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Token parity
        run: yarn check-tokens

      - name: Token parity
        run: npm run check-tokens

      - name: Type check
        run: yarn type-check

      - name: Lint
        run: yarn lint

      - name: Build package
        run: yarn build

      - name: Build Storybook
        run: yarn build-storybook
